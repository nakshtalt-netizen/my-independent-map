<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ментальна карта спогадів</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Montserrat', sans-serif; text-align: center;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 2.5em; margin-bottom: 20px; letter-spacing: -1px; }
        p { line-height: 1.6; color: #ccc; font-size: 1.1em; margin-bottom: 30px; }
        
        .map-frame {
            width: 100%; height: 600px; border: 1px solid #333;
            border-radius: 12px; overflow: hidden; background: #111;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .controls { margin: 30px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 12px 24px; cursor: pointer; border-radius: 30px;
            transition: all 0.3s; font-weight: bold; text-decoration: none;
        }
        .btn:hover, .btn.active { background: #fff; color: #000; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .map-frame { height: 400px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ментальна карта спогадів</h1>
    <p>
        Цей проєкт візуалізує колективну пам'ять за допомогою нейромереж. 
        Ми перетворили тисячі текстових спогадів на інтерактивний простір сенсів, 
        де близькі за змістом події утворюють спільні острови та кластери.
    </p>

    <div class="controls">
        <button class="btn active" onclick="changeMap('map_islands.html', this)">Мапа островів</button>
        <button class="btn" onclick="changeMap('map_points.html', this)">Мапа точок</button>
    </div>

    <div class="map-frame">
        <iframe src="map_islands.html" id="map-iframe"></iframe>
    </div>

    <p style="margin-top: 50px; font-size: 0.9em; color: #666;">
        Створено за допомогою ШІ (Sentence-Transformers & UMAP). 2024
    </p>
</div>

<script>
    function changeMap(fileName, btn) {
        document.getElementById('map-iframe').src = fileName;
        
        // Знімаємо клас active з усіх кнопок
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        // Додаємо active на натиснуту
        btn.classList.add('active');
    }
</script>

</body>
</html>
